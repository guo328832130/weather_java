<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百川教育 — 教育管理平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon logo-svg">
                <svg viewBox="0 0 36 36" width="36" height="36">
                    <rect width="36" height="36" rx="6" fill="#4F46E5"/>
                    <text x="18" y="24" text-anchor="middle" fill="white" font-size="20" font-weight="bold">百</text>
                </svg>
            </span>
            <div style="display:flex;align-items:center;gap:6px;">
                <span class="logo-text">百川教育</span>
                <span class="logo-badge">机构</span>
            </div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-user" id="sidebarUser" style="display:none;">
            <div class="avatar" id="sidebarAvatar">百</div>
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">用户</div>
                <div class="user-role">管理员</div>
            </div>
            <a class="sidebar-logout" id="btnSidebarLogout" href="#" title="退出登录">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </aside>
    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle" title="折叠菜单">☰</button>
                <span class="topbar-title" id="topbarTitle">百川教育</span>
            </div>
            <div class="topbar-right" id="topbarRight"></div>
        </header>
        <main class="main-content" id="app"></main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
